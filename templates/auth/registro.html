{% extends "base.html" %}
{% block title %}Registro{% endblock %}

{% block content %}
<div class="container" style="max-width:420px;padding-top:3rem;">
  <div style="text-align:center;margin-bottom:2rem;">
    <div style="font-size:3rem;margin-bottom:0.5rem;">🎟</div>
    <h2>Crear <span style="color:var(--gold)">Cuenta</span></h2>
    <p style="color:var(--text2);margin-top:0.5rem;">Regístrate para comprar tus tiquetes</p>
  </div>
  <div class="card">
    <div class="card-body">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Nombre completo</label>
          <input type="text" name="nombre" class="form-control" placeholder="Tu nombre"
                 value="{{ request.form.get('nombre','') }}" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Correo electrónico</label>
          <input type="email" name="email" class="form-control" placeholder="tu@email.com"
                 value="{{ request.form.get('email','') }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input type="password" name="contrasena" class="form-control" placeholder="Mínimo 6 caracteres" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar contraseña</label>
          <input type="password" name="confirmar" class="form-control" placeholder="Repite tu contraseña" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Registrarse</button>
      </form>
    </div>
    <div class="card-footer text-center">
      <span style="color:var(--text2);font-size:0.88rem;">¿Ya tienes cuenta?</span>
      <a href="{{ url_for('auth.login') }}" style="margin-left:0.5rem;">Inicia sesión</a>
    </div>
  </div>
</div>
{% endblock %}
