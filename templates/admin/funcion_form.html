{% extends "admin/base_admin.html" %}
{% block title %}{{ accion }} Función{% endblock %}

{% block admin_content %}
<div class="section-header">
  <h2 class="section-title">{{ accion }} <span>Función</span></h2>
  <a href="{{ url_for('admin.funciones') }}" class="btn btn-outline">← Volver</a>
</div>

<div class="card" style="max-width:600px;">
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Película *</label>
        <select name="pelicula_id" class="form-control" required>
          <option value="">— Selecciona una película —</option>
          {% for p in peliculas %}
            <option value="{{ p.id }}" {% if funcion and funcion.pelicula_id == p.id %}selected{% endif %}>
              {{ p.titulo }} ({{ p.duracion }} min)
            </option>
          {% endfor %}
        </select>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Fecha *</label>
          <input type="date" name="fecha" class="form-control" required
                 value="{{ funcion.fecha if funcion else '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Hora *</label>
          <input type="time" name="hora" class="form-control" required
                 value="{{ funcion.hora if funcion else '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Sala</label>
          <select name="sala" class="form-control">
            {% for s in ['Sala 1','Sala 2','Sala 3','Sala VIP'] %}
              <option value="{{ s }}" {% if funcion and funcion.sala == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Precio (COP) *</label>
          <input type="number" name="precio" class="form-control" required min="0" step="500"
                 value="{{ funcion.precio if funcion else '' }}" placeholder="15000">
        </div>
        <div class="form-group">
          <label class="form-label">Estado</label>
          <select name="estado" class="form-control">
            <option value="disponible" {% if not funcion or funcion.estado=='disponible' %}selected{% endif %}>Disponible</option>
            <option value="cancelada" {% if funcion and funcion.estado=='cancelada' %}selected{% endif %}>Cancelada</option>
          </select>
        </div>
      </div>
      <div style="background:var(--bg3);border-radius:var(--radius);padding:0.75rem;font-size:0.82rem;color:var(--text2);margin-bottom:1.25rem;">
        ⚠️ No puede haber dos funciones en la misma sala, fecha y hora exacta.
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">💾 {{ accion }} Función</button>
        <a href="{{ url_for('admin.funciones') }}" class="btn btn-outline">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
